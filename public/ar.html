<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>AR Scene Viewer</title>

  <!-- model-viewer: handles ARKit (iOS) and ARCore (Android) natively -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f0f;
      --card:       #1a1a1a;
      --border:     #2a2a2a;
      --blue:       #3a86ff;
      --text:       #ffffff;
      --text-muted: #888888;
      --radius:     14px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      overflow: hidden;
    }

    .screen {
      position: fixed;
      inset: 0;
      transition: opacity 0.25s ease;
    }
    .hidden { opacity: 0; pointer-events: none; }

    /* ─── PICKER ───────────────────────────────────────── */
    #picker-screen {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: max(env(safe-area-inset-bottom), 24px);
    }

    .picker-header {
      padding: max(env(safe-area-inset-top), 48px) 24px 24px;
      text-align: center;
    }
    .picker-header h1 {
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 800;
      margin-bottom: 6px;
    }
    .picker-header p { font-size: 14px; color: var(--text-muted); }

    .picker-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px 32px;
    }

    .model-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .model-card:active { background: #222; }

    .card-emoji { font-size: 40px; line-height: 1; }
    .card-name  { font-size: 15px; font-weight: 700; }
    .card-desc  { font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.4; }

    .card-btn {
      margin-top: 8px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      min-height: 36px;
    }

    /* ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.14);
      transform: scale(0);
      animation: ripple 0.5s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple { to { transform: scale(1); opacity: 0; } }

    /* ─── AR SCREEN ────────────────────────────────────── */
    #ar-screen { background: #111; }

    /* model-viewer fills the entire screen */
    model-viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-color: #111;
      --poster-color: #111;
    }

    /* toolbar floats over the top */
    #ar-toolbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top), 12px) 16px 12px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
    }

    .toolbar-btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 36px;
    }

    #model-title { font-size: 15px; font-weight: 700; }

    /* footer floats over the bottom */
    #ar-footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 24px max(env(safe-area-inset-bottom), 24px);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
    }

    #ar-btn {
      width: 100%;
      max-width: 320px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px 36px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(58,134,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 56px;
    }
    #ar-btn:disabled {
      opacity: 0.45;
      box-shadow: none;
    }

    #ar-status {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ─── TOAST ─────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom), 24px);
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: rgba(20,20,20,0.92);
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 2000;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ═══════════════════════════════
     PICKER
════════════════════════════════ -->
<div id="picker-screen" class="screen">
  <div class="picker-header">
    <h1>AR Scene Viewer</h1>
    <p>Siegen-Feuersbach Community Project</p>
  </div>
  <div class="picker-grid" id="model-grid"></div>
</div>


<!-- ═══════════════════════════════
     AR VIEW
════════════════════════════════ -->
<div id="ar-screen" class="screen hidden">

  <div id="ar-toolbar">
    <button class="toolbar-btn" onclick="showPicker()">← Back</button>
    <span id="model-title">Chair</span>
    <div style="width:80px"></div>
  </div>

  <model-viewer
    id="model-view"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="3D model"
  ></model-viewer>

  <div id="ar-footer">
    <button id="ar-btn" onclick="startAR()">
      <span>📷</span> Place in Your Room
    </button>
    <p id="ar-status">Loading 3D preview…</p>
  </div>

</div>


<div id="toast"></div>


<script>
const MODELS = [
  { id: 'chair',        emoji: '🪑', name: 'Chair',        desc: 'Classic seating element' },
  { id: 'office_chair', emoji: '💺', name: 'Office Chair', desc: 'Ergonomic swivel seating' },
  { id: 'sofa',         emoji: '🛋️', name: 'Sofa',         desc: 'Comfortable lounge seating' },
  { id: 'table',        emoji: '🪵', name: 'Table',        desc: 'Shared outdoor surface' },
];

// ─── INIT ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildPickerGrid();

  const viewer = document.getElementById('model-view');

  viewer.addEventListener('load', () => {
    document.getElementById('ar-status').textContent = 'Tap the button to place in your space';
  });

  viewer.addEventListener('error', () => {
    document.getElementById('ar-status').textContent = 'Could not load model file';
  });

  viewer.addEventListener('ar-status', (e) => {
    if (e.detail.status === 'failed') {
      showToast('AR failed — check camera permission and that you\'re on HTTPS');
    }
  });
});

async function startAR() {
  const viewer = document.getElementById('model-view');

  // model-viewer web component not registered yet (script still loading)
  if (typeof viewer.activateAR !== 'function') {
    showToast('Still loading — please wait a moment and try again');
    return;
  }

  try {
    await viewer.activateAR();
  } catch (e) {
    const msg = e?.message || String(e);
    if (msg.includes('not supported') || msg.includes('XR')) {
      showToast('AR not supported on this browser — use iOS Safari or Android Chrome');
    } else {
      showToast('Could not start AR: ' + msg);
    }
  }
}

// ─── PICKER ──────────────────────────────────────────────
function buildPickerGrid() {
  const grid = document.getElementById('model-grid');
  grid.innerHTML = '';
  MODELS.forEach(m => {
    const card = document.createElement('div');
    card.className = 'model-card';
    card.innerHTML = `
      <div class="card-emoji">${m.emoji}</div>
      <div class="card-name">${m.name}</div>
      <div class="card-desc">${m.desc}</div>
      <button class="card-btn">View in AR</button>
    `;
    card.addEventListener('pointerdown', (e) => {
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = card.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height) * 1.5;
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      card.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    });
    card.querySelector('.card-btn').addEventListener('click', () => selectModel(m.id));
    grid.appendChild(card);
  });
}

// ─── SCREENS ─────────────────────────────────────────────
function showScreen(id) {
  ['picker-screen', 'ar-screen'].forEach(sid =>
    document.getElementById(sid).classList.toggle('hidden', sid !== id)
  );
}

function showPicker() {
  showScreen('picker-screen');
  const viewer = document.getElementById('model-view');
  viewer.src = '';
  document.getElementById('ar-status').textContent = 'Loading 3D preview…';
}

function selectModel(modelId) {
  const m = MODELS.find(x => x.id === modelId);
  if (!m) return;

  document.getElementById('model-title').textContent = m.name;

  const viewer = document.getElementById('model-view');
  viewer.src = `/models/${modelId}.glb`;
  viewer.alt = m.name;

  showScreen('ar-screen');
}

// ─── TOAST ───────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, ms = 3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}
</script>
</body>
</html>
